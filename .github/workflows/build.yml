name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22']
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact_name: softhsm-gui-linux-amd64
            cgo: '1'
          - os: ubuntu-latest
            arch: arm64
            artifact_name: softhsm-gui-linux-arm64
            cgo: '1'
          - os: windows-latest
            arch: amd64
            artifact_name: softhsm-gui-windows-amd64.exe
            cgo: '1'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Fyne dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libgtk-3-dev libdbus-1-dev

      - name: Install SoftHSM for testing (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y softhsm2
          mkdir -p /tmp/softhsm_test
          printf 'directories.tokendir = /tmp/softhsm_test\nobjectstore.backend = file\nlog.level = ERROR\n' | sudo tee /etc/softhsm/softhsm2.conf
          sudo softhsm2-util --init-token --free --label "test-token" --so-pin 123456 --pin 111111 || true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: cache-go-${{ runner.os }}-${{ matrix.go-version }}-${{ hashFiles('go.mod') }}
          restore-keys: |
            cache-go-${{ runner.os }}-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.os == 'windows-latest' && 'windows' || 'linux' }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          go build -mod=mod -ldflags="-s -w" -o "${{ matrix.artifact_name }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Auto-generated release from commit ${{ github.sha }}"
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
